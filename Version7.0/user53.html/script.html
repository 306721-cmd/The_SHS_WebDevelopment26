<!DOCTYPE html>
<html lang="en">
<head>
    <title>JavaScript Games</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f4f4f4;
            margin:0;
        }

        header, footer{
            background:#343a40;
            color:white;
            padding:20px;
        }

        section{
            background:white;
            width:80%;
            margin:20px auto;
            padding:20px;
            border-radius:10px;
        }

        #box{
            width:150px;
            height:150px;
            background:red;
            margin:20px auto;
            display:none;
        }

        #colorSquare{
            width:200px;
            height:200px;
            background:blue;
            margin:20px auto;
        }
    </style>
</head>

<body>

<header>
    <h1>JavaScript Games</h1>
    <p>Simple Interactive Webpage</p>
</header>

<section>
    <h2>Reaction Game</h2>
    <button onclick="startGame()" class="btn btn-success">Start</button>
    <div id="box" onclick="stopGame()"></div>
    <h3 id="result"></h3>
</section>

<section>
    <h2>Color Changer</h2>
    <div id="colorSquare"></div>
    <button onclick="changeColor()" class="btn btn-primary">Change Color</button>
</section>

<section>
    <h2>Counter Game</h2>
    <h1 id="score">0</h1>
    <button onclick="addScore()" class="btn btn-danger">Add Point</button>
    <button onclick="resetScore()" class="btn btn-dark">Reset</button>
</section>

<footer>
    <p>JavaScript Assignment</p>
</footer>

<script>

    // runs ONCE when page loads
    window.onload = function(){
        alert("Welcome to my JavaScript Games!");
    };

    // Reaction game
    var startTime;

    function startGame(){
        document.getElementById("result").innerHTML = "Wait for the box...";
        document.getElementById("box").style.display = "none";

        var time = Math.random() * 3000;

        setTimeout(function(){
            document.getElementById("box").style.display = "block";
            startTime = new Date().getTime();
        }, time);
    }

    function stopGame(){
        var endTime = new Date().getTime();
        var reaction = (endTime - startTime) / 1000;

        document.getElementById("result").innerHTML =
        "Your time: " + reaction + " seconds";

        document.getElementById("box").style.display = "none";
    }

    // Color changer
    function changeColor(){
        var colors = ["red","blue","green","purple","orange","pink"];

        var random = colors[Math.floor(Math.random() * colors.length)];

        document.getElementById("colorSquare").style.background = random;
    }

    // Counter game
    var score = 0;

    function addScore(){
        score = score + 1;
        document.getElementById("score").innerHTML = score;
    }

    function resetScore(){
        score = 0;
        document.getElementById("score").innerHTML = score;
    }

</script>

</body>
</html>
